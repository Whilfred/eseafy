<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELISA — Multi-Agent Intelligence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: #f5f5f0;
      height: 100vh;
      overflow: hidden;
    }

    /* Main container */
    .app {
      display: flex;
      height: 100vh;
      background: #ffffff;
    }

    /* LEFT PANEL - Chat Area */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-right: 1px solid #e8e8e8;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e8e8e8;
      background: #ffffff;
    }
    .chat-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.3px;
    }
    .chat-header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    /* Progress bar */
    .progress-container {
      padding: 0 24px 12px 24px;
      border-bottom: 1px solid #e8e8e8;
    }
    .progress-bar {
      height: 2px;
      background: #e8e8e8;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #1a1a1a;
      transition: width 0.3s ease;
      border-radius: 2px;
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
    }

    /* Messages area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scroll-behavior: smooth;
    }

    /* Message styles */
    .message {
      margin-bottom: 20px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-user {
      display: flex;
      justify-content: flex-end;
    }
    .message-user .message-bubble {
      background: #f0f0f0;
      color: #1a1a1a;
      border-radius: 16px 16px 4px 16px;
      max-width: 70%;
      padding: 10px 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message-agent {
      display: flex;
      gap: 12px;
    }
    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .message-content {
      flex: 1;
    }
    .message-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .message-name {
      font-weight: 600;
      font-size: 13px;
      color: #1a1a1a;
    }
    .message-role {
      font-size: 11px;
      color: #999;
    }
    .message-time {
      font-size: 10px;
      color: #ccc;
      margin-left: auto;
    }
    .message-bubble {
      background: #fafafa;
      border: 1px solid #eeeeee;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message-bubble.central {
      background: #f8f8f8;
      border-left: 3px solid #1a1a1a;
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0 12px 44px;
      animation: pulse 1s ease infinite;
    }
    .thinking-dots {
      display: flex;
      gap: 4px;
    }
    .thinking-dots span {
      width: 6px;
      height: 6px;
      background: #ccc;
      border-radius: 50%;
      animation: bounce 1.4s ease infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    .thinking-text {
      font-size: 12px;
      color: #aaa;
    }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Separator */
    .separator {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0 20px 0;
    }
    .separator-line {
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }
    .separator-text {
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.5px;
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px 24px;
      border-top: 1px solid #e8e8e8;
      background: #ffffff;
    }
    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-wrapper input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: #ffffff;
      transition: all 0.2s;
      resize: vertical;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: #1a1a1a;
    }
    .input-wrapper input::placeholder {
      color: #ccc;
    }
    .input-wrapper button {
      padding: 12px 24px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .input-wrapper button:hover:not(:disabled) {
      background: #333;
      transform: translateY(-1px);
    }
    .input-wrapper button:disabled {
      background: #e0e0e0;
      cursor: not-allowed;
    }

    /* RIGHT PANEL - Agents */
    .agents-panel {
      width: 280px;
      background: #fafaf8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .agents-header {
      padding: 20px 20px 12px 20px;
      border-bottom: 1px solid #e8e8e8;
    }
    .agents-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.2px;
    }
    .agents-header p {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }
    .agents-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Agent Card */
    .agent-card {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .agent-card.new {
      animation: cardAppear 0.5s ease;
    }
    @keyframes cardAppear {
      0% {
        opacity: 0;
        transform: translateX(20px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
    .agent-card:hover {
      border-color: #d0d0d0;
      transform: translateX(2px);
    }
    .agent-card.active {
      border-color: #1a1a1a;
      background: #fefefe;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .agent-card.done {
      opacity: 0.7;
      background: #f9f9f9;
    }
    .agent-card-content {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .agent-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .agent-info {
      flex: 1;
    }
    .agent-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 2px;
    }
    .agent-role {
      font-size: 11px;
      color: #999;
    }
    .agent-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ddd;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .agent-card.active .agent-status {
      background: #1a1a1a;
      box-shadow: 0 0 0 2px rgba(26,26,26,0.1);
      animation: statusPulse 1.5s ease infinite;
    }
    .agent-card.done .agent-status {
      background: #aaa;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* New agent badge */
    .new-badge {
      position: absolute;
      top: -8px;
      right: 12px;
      background: #1a1a1a;
      color: white;
      font-size: 9px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      animation: badgeGlow 0.5s ease;
    }
    @keyframes badgeGlow {
      0% {
        opacity: 0;
        transform: translateY(-10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #ccc;
      text-align: center;
      padding: 40px;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state-text {
      font-size: 13px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #f0f0f0;
    }
    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- LEFT: Chat Area -->
  <div class="chat-panel">
    <div class="chat-header">
      <h1>ELISA</h1>
      <p>Multi-agent intelligence · Analyse e-commerce</p>
    </div>
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-stats">
        <span id="progressText">0%</span>
        <span id="statusText">Prêt</span>
      </div>
    </div>
    <div class="messages-area" id="messagesArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-text">Entrez un sujet pour démarrer l'analyse</div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="sujetInput" placeholder="Ex: Comment augmenter le panier moyen des clients premium ?" />
        <button id="startBtn">Démarrer</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Agents Panel -->
  <div class="agents-panel">
    <div class="agents-header">
      <h2>🤖 Agents actifs</h2>
      <p>Suivi en temps réel</p>
    </div>
    <div class="agents-list" id="agentsList"></div>
  </div>
</div>

<script>
// Agent definitions
const AGENT_DEFS = [
  { key: 'central', name: 'Central', role: 'Orchestrateur', icon: '🧠', color: '#1a1a1a' },
  { key: 'data', name: 'Data Agent', role: 'Analyste données', icon: '📊', color: '#555' },
  { key: 'prospect', name: 'Prospect Agent', role: 'Qualification leads', icon: '🔎', color: '#555' },
  { key: 'scoring', name: 'Scoring Agent', role: 'Propension achat', icon: '🎯', color: '#555' },
  { key: 'product', name: 'Product Agent', role: 'Offres produit', icon: '🛒', color: '#555' },
  { key: 'marketing', name: 'Marketing Agent', role: 'Campagnes email', icon: '📧', color: '#555' },
  { key: 'optimization', name: 'Optim Agent', role: 'ROI & Simulations', icon: '⚡', color: '#555' }
];

let sessionId = null;
let isRunning = false;
let currentState = null;
let activeAgentKey = null;
let doneAgents = new Set();

// DOM elements
const agentsList = document.getElementById('agentsList');
const messagesArea = document.getElementById('messagesArea');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const statusText = document.getElementById('statusText');
const startBtn = document.getElementById('startBtn');
const sujetInput = document.getElementById('sujetInput');

// Create agent cards
function createAgentCards() {
  agentsList.innerHTML = '';
  AGENT_DEFS.forEach(def => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.id = `agent-${def.key}`;
    card.setAttribute('data-key', def.key);
    card.innerHTML = `
      <div class="agent-card-content">
        <div class="agent-icon" style="background: #f5f5f5;">${def.icon}</div>
        <div class="agent-info">
          <div class="agent-name">${def.name}</div>
          <div class="agent-role">${def.role}</div>
        </div>
        <div class="agent-status"></div>
      </div>
    `;
    agentsList.appendChild(card);
  });
}

// Update agent card status
function updateAgentCard(key, status) {
  const card = document.getElementById(`agent-${key}`);
  if (!card) return;

  if (status === 'active') {
    card.classList.add('active');
    card.classList.remove('done');
    // Add new badge animation when activated
    const existingBadge = card.querySelector('.new-badge');
    if (!existingBadge && !doneAgents.has(key)) {
      const badge = document.createElement('div');
      badge.className = 'new-badge';
      badge.textContent = 'ACTIF';
      card.style.position = 'relative';
      card.appendChild(badge);
      setTimeout(() => badge.remove(), 2000);
    }
  } else if (status === 'done') {
    card.classList.remove('active');
    card.classList.add('done');
    doneAgents.add(key);
  } else {
    card.classList.remove('active', 'done');
  }
}

// Reset all agent cards
function resetAgents() {
  doneAgents.clear();
  AGENT_DEFS.forEach(def => {
    updateAgentCard(def.key, 'idle');
  });
}

// Add message to chat
function addMessage(msg, isUser = false) {
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.remove();

  const messageDiv = document.createElement('div');
  messageDiv.className = 'message';
  
  if (isUser) {
    messageDiv.className = 'message message-user';
    messageDiv.innerHTML = `
      <div class="message-bubble">${escapeHtml(msg)}</div>
    `;
  } else {
    const isCentral = msg.agent_key === 'central';
    const agentDef = AGENT_DEFS.find(a => a.key === msg.agent_key) || { name: msg.agent_name, role: '', icon: '🤖' };
    
    messageDiv.className = 'message message-agent';
    messageDiv.innerHTML = `
      <div class="message-avatar" style="background: #f5f5f5;">${agentDef.icon}</div>
      <div class="message-content">
        <div class="message-header">
          <span class="message-name">${escapeHtml(agentDef.name)}</span>
          <span class="message-role">${escapeHtml(agentDef.role)}</span>
          <span class="message-time">${new Date().toLocaleTimeString('fr', { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
        <div class="message-bubble ${isCentral ? 'central' : ''}">${formatMessage(escapeHtml(msg.message))}</div>
      </div>
    `;
  }
  
  messagesArea.appendChild(messageDiv);
  scrollToBottom();
  return messageDiv;
}

// Format message with markdown-like tables
function formatMessage(text) {
  // Simple formatting for tables
  let formatted = text.replace(/\n/g, '<br>');
  formatted = formatted.replace(/\|(.+?)\|/g, (match) => {
    const cells = match.split('|').filter(c => c.trim());
    if (cells.length > 1) {
      return `<div style="margin: 8px 0;"><table style="width:100%; border-collapse:collapse; font-size:12px;">${cells.map(c => `<td style="border:1px solid #eee; padding:6px 8px;">${c.trim()}</td>`).join('')}</table></div>`;
    }
    return match;
  });
  return formatted;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

let thinkingDiv = null;
function showThinking(agentKey) {
  removeThinking();
  const agentDef = AGENT_DEFS.find(a => a.key === agentKey) || { name: 'Agent', icon: '🤖' };
  thinkingDiv = document.createElement('div');
  thinkingDiv.className = 'thinking';
  thinkingDiv.innerHTML = `
    <div class="thinking-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="thinking-text">${agentDef.icon} ${agentDef.name} analyse en cours...</div>
  `;
  messagesArea.appendChild(thinkingDiv);
  scrollToBottom();
}

function removeThinking() {
  if (thinkingDiv) {
    thinkingDiv.remove();
    thinkingDiv = null;
  }
}

function scrollToBottom() {
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

// Progress update
function updateProgress(step, total) {
  const percent = Math.round((step / total) * 100);
  progressFill.style.width = `${percent}%`;
  progressText.textContent = `${percent}%`;
}

// Process next message
async function processNext() {
  if (!isRunning || !sessionId) return;

  try {
    const response = await fetch('/api/next', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
    const data = await response.json();

    if (data.finished) {
      removeThinking();
      isRunning = false;
      startBtn.disabled = false;
      statusText.textContent = '✓ Terminé';
      updateProgress(AGENT_DEFS.length, AGENT_DEFS.length);
      // Mark all as done
      AGENT_DEFS.forEach(def => updateAgentCard(def.key, 'done'));
      return;
    }

    if (data.message) {
      removeThinking();
      const msg = data.message;
      
      // Update active agent
      if (activeAgentKey && activeAgentKey !== msg.agent_key) {
        updateAgentCard(activeAgentKey, 'done');
      }
      activeAgentKey = msg.agent_key;
      updateAgentCard(msg.agent_key, 'active');
      
      // Add message
      addMessage(msg);
      
      // Update progress
      if (data.progress !== undefined) {
        updateProgress(data.progress * 100, 100);
        statusText.textContent = `${Math.round(data.progress * 100)}%`;
      }
      
      // Show thinking for next agent if not finished
      if (!data.finished && data.state && data.state !== 'done') {
        const nextAgent = guessNextAgent(data.state);
        if (nextAgent) {
          setTimeout(() => showThinking(nextAgent), 200);
        }
      }
      
      // Continue
      setTimeout(processNext, 500);
    }
  } catch (error) {
    console.error('Error:', error);
    statusText.textContent = 'Erreur';
    isRunning = false;
    startBtn.disabled = false;
    removeThinking();
  }
}

function guessNextAgent(state) {
  if (state.includes('data')) return 'data';
  if (state.includes('prospect')) return 'prospect';
  if (state.includes('scoring')) return 'scoring';
  if (state.includes('product')) return 'product';
  if (state.includes('marketing')) return 'marketing';
  if (state.includes('optim')) return 'optimization';
  return 'central';
}

// Start conversation
async function startConversation() {
  const sujet = sujetInput.value.trim();
  if (!sujet) return;
  
  startBtn.disabled = true;
  isRunning = true;
  activeAgentKey = null;
  resetAgents();
  
  // Clear messages
  messagesArea.innerHTML = '';
  
  // Add user message
  addMessage(sujet, true);
  
  statusText.textContent = 'Démarrage...';
  updateProgress(0, 100);
  
  // Show thinking for central
  showThinking('central');
  
  try {
    const response = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sujet })
    });
    const data = await response.json();
    
    if (data.error) {
      statusText.textContent = `Erreur: ${data.error}`;
      isRunning = false;
      startBtn.disabled = false;
      removeThinking();
      return;
    }
    
    sessionId = data.session_id;
    processNext();
  } catch (error) {
    console.error('Start error:', error);
    statusText.textContent = 'Erreur de connexion';
    isRunning = false;
    startBtn.disabled = false;
    removeThinking();
  }
}

// Event listeners
startBtn.addEventListener('click', startConversation);
sujetInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !startBtn.disabled) {
    startConversation();
  }
});

// Initialize
createAgentCards();
</script>
</body>
</html>
